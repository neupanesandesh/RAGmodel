# Production overlay. Compose with: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
services:
  ragmodel:
    restart: unless-stopped
    environment:
      - ENVIRONMENT=production
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    build:
      context: .
      dockerfile: Dockerfile

  qdrant:
    restart: unless-stopped
