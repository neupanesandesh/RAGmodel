name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel stale runs on the same ref so CI always reflects the latest push.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Fast lane: lint + unit tests. No Weaviate, no model download.
  # The FakeStore/FakeEmbedder in tests/test_api.py keep this hermetic.
  # ---------------------------------------------------------------------------
  unit:
    name: lint + unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check service client tests scripts

      - name: Unit tests
        env:
          ENVIRONMENT: development
          API_KEY: testkey
        run: pytest -m "not slow and not integration" --tb=short

  # ---------------------------------------------------------------------------
  # Integration lane: spin up a real Weaviate and exercise weaviate_store.py
  # directly. Catches v4-client API drift that mocks cannot model.
  # ---------------------------------------------------------------------------
  integration:
    name: weaviate integration tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: unit
    services:
      weaviate:
        image: cr.weaviate.io/semitechnologies/weaviate:1.27.0
        ports:
          - 8080:8080
          - 50051:50051
        env:
          QUERY_DEFAULTS_LIMIT: "25"
          AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: "true"
          PERSISTENCE_DATA_PATH: "/var/lib/weaviate"
          DEFAULT_VECTORIZER_MODULE: "none"
          ENABLE_MODULES: ""
          AUTOSCHEMA_ENABLED: "true"
          CLUSTER_HOSTNAME: "node1"
          DISABLE_TELEMETRY: "true"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Wait for Weaviate
        run: |
          for i in {1..30}; do
            if curl -sf http://localhost:8080/v1/.well-known/ready >/dev/null; then
              echo "weaviate ready"
              exit 0
            fi
            echo "waiting for weaviate ($i)..."
            sleep 2
          done
          echo "weaviate did not become ready" >&2
          exit 1

      - name: Integration tests
        env:
          RUN_INTEGRATION: "1"
          WEAVIATE_HOST: localhost
          WEAVIATE_HTTP_PORT: "8080"
          WEAVIATE_GRPC_PORT: "50051"
        run: pytest tests/test_weaviate_store.py -m integration --tb=short

  # ---------------------------------------------------------------------------
  # End-to-end lane: build the service image, bring up the full compose stack,
  # run the smoke script. Mirrors what a user gets from `docker compose up`.
  # ---------------------------------------------------------------------------
  smoke:
    name: docker compose smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: unit
    steps:
      - uses: actions/checkout@v4

      - name: Build and start stack
        env:
          API_KEY: smokekey
        run: |
          echo "API_KEY=smokekey" > .env
          docker compose up -d --build

      - name: Wait for service
        run: |
          for i in {1..40}; do
            if curl -sf http://localhost:8000/health >/dev/null; then
              echo "service ready"
              exit 0
            fi
            echo "waiting for service ($i)..."
            sleep 3
          done
          docker compose logs
          echo "service did not become ready" >&2
          exit 1

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install client deps
        run: pip install requests

      - name: Run smoke test
        env:
          BASE_URL: http://localhost:8000
          API_KEY: smokekey
        run: python scripts/smoke.py

      - name: Dump service logs on failure
        if: failure()
        run: docker compose logs --no-color

      - name: Tear down
        if: always()
        run: docker compose down -v
