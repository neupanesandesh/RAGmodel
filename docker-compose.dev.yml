# ========================================
# DEVELOPMENT CONFIGURATION
# ========================================
#
# This file adds development-specific settings on top of docker-compose.yml
#
# Usage:
#   docker-compose -f docker-compose.yml -f docker-compose.dev.yml up
#
# Or create an alias in your shell:
#   alias dcdev="docker-compose -f docker-compose.yml -f docker-compose.dev.yml"
#   Then use: dcdev up
#
# ========================================

services:
  embedding-service:
    # ─────────────────────────────────────
    # VOLUME MOUNTING
    # ─────────────────────────────────────
    # Mount your local code directories into the container
    # Any changes you make to .py files will be reflected immediately
    # No need to rebuild the Docker image!
    volumes:
      - ./service:/app/service        # FastAPI application code
      - ./client:/app/client          # Client library code
      - ./pyproject.toml:/app/pyproject.toml  # Package configuration
      - embedding_logs:/app/logs      # Log files (persistent)

    # ─────────────────────────────────────
    # DEVELOPMENT LOGGING
    # ─────────────────────────────────────
    # Ensure development environment is set
    environment:
      - ENVIRONMENT=development
      - LOG_LEVEL=${LOG_LEVEL:-DEBUG}

    # ─────────────────────────────────────
    # HOT-RELOAD ENABLED WITH EDITABLE INSTALL
    # ─────────────────────────────────────
    # Install package in editable mode (pip install -e .) then start with --reload
    # This makes imports work properly: "from client import EmbeddingClient"
    # FastAPI will automatically restart when it detects code changes
    # You'll see "Reloading..." in the logs when you save a file
    command: sh -c "pip install -e . && python -m uvicorn service.main:app --host 0.0.0.0 --port 8000 --reload"

    # ─────────────────────────────────────
    # NO AUTO-RESTART
    # ─────────────────────────────────────
    # In dev, we don't want Docker to auto-restart the container
    # We want to see errors clearly and control when to restart
    restart: "no"

    # ─────────────────────────────────────
    # BUILD SETTINGS (Optional but useful)
    # ─────────────────────────────────────
    # Even though we mount volumes, we still need to build once
    # to install dependencies. This ensures we don't use cache
    # when dependencies change.
    build:
      context: .
      dockerfile: Dockerfile
      # Note: In dev, you typically build once, then volumes take over
