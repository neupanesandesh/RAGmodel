# Dev overlay. Mounts code for hot-reload and flips logging to DEBUG.
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up

services:
  rag-service:
    volumes:
      - ./service:/app/service
      - ./client:/app/client
      - ./tests:/app/tests
      - ./pyproject.toml:/app/pyproject.toml
      - rag_logs:/app/logs
      - hf_cache:/app/.cache/huggingface
    environment:
      ENVIRONMENT: development
      LOG_LEVEL: ${LOG_LEVEL:-DEBUG}
    command: sh -c "pip install -e '.[dev]' && python -m uvicorn service.main:app --host 0.0.0.0 --port 8000 --reload"
    restart: "no"
