# Development overlay. Compose with: docker compose -f docker-compose.yml -f docker-compose.dev.yml up
services:
  ragmodel:
    volumes:
      - ./service:/app/service
      - ./client:/app/client
      - ./tests:/app/tests
      - ./pyproject.toml:/app/pyproject.toml
      - hf_cache:/home/appuser/.cache/huggingface
    environment:
      - ENVIRONMENT=development
      - LOG_LEVEL=${LOG_LEVEL:-DEBUG}
      - API_KEY=${API_KEY:-dev-key}
      - CORS_ORIGINS=${CORS_ORIGINS:-*}
    command: sh -c "pip install -e '.[dev]' && python -m uvicorn service.main:app --host 0.0.0.0 --port 8000 --reload"
    restart: "no"
    build:
      context: .
      dockerfile: Dockerfile
