# Base stack: Weaviate + service. Dev and prod compose files extend this.
services:
  weaviate:
    image: cr.weaviate.io/semitechnologies/weaviate:1.27.0
    container_name: rag-weaviate
    restart: unless-stopped
    ports:
      - "8080:8080"   # HTTP/REST
      - "50051:50051" # gRPC
    environment:
      QUERY_DEFAULTS_LIMIT: "25"
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: "true"
      PERSISTENCE_DATA_PATH: "/var/lib/weaviate"
      DEFAULT_VECTORIZER_MODULE: "none"
      ENABLE_MODULES: ""
      AUTOSCHEMA_ENABLED: "true"
      CLUSTER_HOSTNAME: "node1"
      DISABLE_TELEMETRY: "true"
      LIMIT_RESOURCES: "true"
    volumes:
      - weaviate_data:/var/lib/weaviate
    networks:
      - rag-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/v1/.well-known/ready"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  rag-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rag-service
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      # Weaviate
      WEAVIATE_HOST: weaviate
      WEAVIATE_HTTP_PORT: "8080"
      WEAVIATE_GRPC_PORT: "50051"
      WEAVIATE_COLLECTION: ${WEAVIATE_COLLECTION:-Document}

      # Embedder
      EMBEDDER_BACKEND: ${EMBEDDER_BACKEND:-st}
      ST_MODEL: ${ST_MODEL:-BAAI/bge-small-en-v1.5}
      EMBEDDING_DIMENSION: ${EMBEDDING_DIMENSION:-384}

      # Optional Gemini (needed only for /generate)
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_GENERATIVE_MODEL: ${GEMINI_GENERATIVE_MODEL:-gemini-2.5-flash}

      # Service
      SERVICE_HOST: 0.0.0.0
      SERVICE_PORT: "8000"
      API_KEY: ${API_KEY:-}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-}
      RATE_LIMIT_PER_MINUTE: ${RATE_LIMIT_PER_MINUTE:-120}

      # Observability
      ENVIRONMENT: ${ENVIRONMENT:-development}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_DIR: /app/logs
      ENABLE_METRICS: "true"

      # Huggingface cache (survives rebuilds via named volume)
      HF_HOME: /app/.cache/huggingface
    volumes:
      - rag_logs:/app/logs
      - hf_cache:/app/.cache/huggingface
    depends_on:
      weaviate:
        condition: service_healthy
    networks:
      - rag-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0) if urllib.request.urlopen('http://localhost:8000/health').status==200 else sys.exit(1)"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  weaviate_data:
  rag_logs:
  hf_cache:

networks:
  rag-network:
    driver: bridge
