services:
  # Qdrant Vector Database
  qdrant:
    image: qdrant/qdrant:latest
    container_name: embedding-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333" # REST API
      - "6334:6334" # gRPC API
    volumes:
      - qdrant_storage:/qdrant/storage
    environment:
      - QDRANT__SERVICE__HTTP_PORT=6333
      - QDRANT__SERVICE__GRPC_PORT=6334
    networks:
      - embedding-network

  # Embedding Service
  # Base configuration - common settings for both dev and prod
  embedding-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: embedding-service
    ports:
      - "5000:8000"
    environment:
      # Gemini Configuration
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GEMINI_MODEL=${GEMINI_MODEL:-models/gemini-embedding-001}
      - EMBEDDING_DIMENSION=${EMBEDDING_DIMENSION:-768}

      # Qdrant Configuration
      - QDRANT_URL=http://qdrant:6333

      # Service Configuration
      - SERVICE_HOST=0.0.0.0
      - SERVICE_PORT=8000

      # Logging Configuration
      - ENVIRONMENT=${ENVIRONMENT:-development}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - LOG_DIR=/app/logs
      - LOG_RETENTION_DAYS=${LOG_RETENTION_DAYS:-30}
      - LOG_ROTATION_SIZE=${LOG_ROTATION_SIZE:-100 MB}
    volumes:
      - embedding_logs:/app/logs
    depends_on:
      - qdrant
    networks:
      - embedding-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  qdrant_storage:
    driver: local
  embedding_logs:
    driver: local

networks:
  embedding-network:
    driver: bridge
