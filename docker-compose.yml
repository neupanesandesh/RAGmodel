services:
  qdrant:
    image: qdrant/qdrant:v1.12.4
    container_name: ragmodel-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    environment:
      - QDRANT__SERVICE__HTTP_PORT=6333
      - QDRANT__SERVICE__GRPC_PORT=6334
    networks:
      - ragmodel-network
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/localhost/6333 && echo -e \"GET /readyz HTTP/1.1\\r\\nHost: localhost\\r\\n\\r\\n\" >&3 && head -1 <&3 | grep -q 200'"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  ragmodel:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ragmodel-service
    restart: unless-stopped
    ports:
      - "5000:8000"
    environment:
      # Embedder
      - EMBEDDER_BACKEND=${EMBEDDER_BACKEND:-sentence-transformers}
      - EMBEDDER_MODEL=${EMBEDDER_MODEL:-BAAI/bge-small-en-v1.5}
      - EMBEDDING_DIMENSION=${EMBEDDING_DIMENSION:-384}
      - EMBEDDER_DEVICE=${EMBEDDER_DEVICE:-}

      # Qdrant
      - QDRANT_URL=http://qdrant:6333

      # Service
      - SERVICE_HOST=0.0.0.0
      - SERVICE_PORT=8000
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000,http://localhost:8000}
      - API_KEY=${API_KEY:-change-me-in-production}
      - RATE_LIMIT=${RATE_LIMIT:-60/minute}

      # Observability
      - ENVIRONMENT=${ENVIRONMENT:-development}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - METRICS_ENABLED=${METRICS_ENABLED:-true}

      # HuggingFace cache (persisted via volume below)
      - HF_HOME=/home/appuser/.cache/huggingface
    volumes:
      - hf_cache:/home/appuser/.cache/huggingface
    depends_on:
      qdrant:
        condition: service_started
    networks:
      - ragmodel-network
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

volumes:
  qdrant_storage:
    driver: local
  hf_cache:
    driver: local

networks:
  ragmodel-network:
    driver: bridge
